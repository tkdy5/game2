<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドリームスクラッチ</title>
    <style>
        :root {
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #d32f2f; margin-bottom: 0.5rem; }
        .info { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
        
        /* スクラッチエリア */
        #scratch-card {
            position: relative;
            width: 250px;
            height: 150px;
            margin: 0 auto 20px;
            cursor: crosshair;
            user-select: none;
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .prize-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            z-index: 1;
        }
        .prize-amount { font-size: 2rem; font-weight: bold; color: #d32f2f; }
        .prize-rank { font-size: 1.2rem; color: #333; }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        button {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #b71c1c; }
        
        .history {
            margin-top: 20px;
            text-align: left;
            width: 100%;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .history h3 { font-size: 1rem; }
        #log { font-size: 0.85rem; height: 100px; overflow-y: auto; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>ドリームスクラッチ</h1>
    <p class="info">※年末ジャンボ宝くじの確率に基づいています</p>
    
    <div id="scratch-card">
        <div class="prize-display">
            <div id="rank-label" class="prize-rank">残念...</div>
            <div id="amount-label" class="prize-amount">はずれ</div>
        </div>
        <canvas id="scratch-canvas" width="250" height="150"></canvas>
    </div>

    <button onclick="initGame()">新しい券を買う (300円)</button>

    <div class="history">
        <h3>結果履歴</h3>
        <div id="log"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // 当選設定（年末ジャンボ 第1032回 参考）
    // 1ユニット2000万枚あたりの本数
    const PRIZES = [
        { rank: "1等", amount: "7億円", weight: 1 },
        { rank: "2等", amount: "1000万円", weight: 150 },
        { rank: "3等", amount: "300万円", weight: 2000 },
        { rank: "4等", amount: "10万円", weight: 10000 },
        { rank: "5等", amount: "5000円", weight: 200000 },
        { rank: "6等", amount: "300円", weight: 2000000 },
    ];
    const TOTAL_TICKETS = 20000000; // 1ユニット

    function getResult() {
        let rand = Math.floor(Math.random() * TOTAL_TICKETS) + 1;
        let cumulativeWeight = 0;

        for (const p of PRIZES) {
            cumulativeWeight += p.weight;
            if (rand <= cumulativeWeight) return p;
        }
        return { rank: "残念...", amount: "はずれ", weight: 0 };
    }

    function initCanvas() {
        ctx.globalCompositeOperation = 'source-over';
        // 銀色のスクラッチ層を描画
        ctx.fillStyle = '#C0C0C0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 装飾的なドット模様
        ctx.fillStyle = '#A9A9A9';
        for(let i=0; i<100; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
            ctx.fill();
        }

        // テキスト案内
        ctx.fillStyle = '#666';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ここを削って！', canvas.width/2, canvas.height/2 + 6);
    }

    function initGame() {
        const result = getResult();
        document.getElementById('rank-label').innerText = result.rank;
        document.getElementById('amount-label').innerText = result.amount;
        
        initCanvas();
        
        // 履歴に追加
        const log = document.getElementById('log');
        const entry = document.createElement('div');
        entry.innerText = `・${result.rank}: ${result.amount}`;
        log.prepend(entry);
    }

    function scratch(e) {
        if (!isDrawing) return;
        
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });

    // 初期化
    initGame();
</script>

</body>
</html>
