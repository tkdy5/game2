<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Retro Circuit Racer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #7290ff; /* 空の色 */
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="ui">
        Speed: <span id="speedOut">0</span> km/h<br>
        Lap: <span id="lapOut">0</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedOut = document.getElementById('speedOut');
        const lapOut = document.getElementById('lapOut');

        // 画面設定
        canvas.width = 640;
        canvas.height = 480;

        // 定数
        const ROAD_WIDTH = 2000;
        const SEGMENT_LENGTH = 200;
        const RUMBLE_LENGTH = 3;
        const LANES = 3;
        const FOV = 100; // 視野角
        const CAMERA_HEIGHT = 1000;
        const DRAW_DISTANCE = 300; // 描画セグメント数

        // ゲーム状態
        let playerX = 0;
        let position = 0;
        let speed = 0;
        const maxSpeed = SEGMENT_LENGTH * 60;
        const accel = maxSpeed / 5;
        const breaking = -maxSpeed;
        const decel = -maxSpeed / 5;
        const offRoadDecel = -maxSpeed / 2;
        const offRoadLimit = maxSpeed / 4;

        let keys = {};
        let segments = [];
        let trackLength = 0;

        // コース生成ヘルパー
        function addSegment(curve, y) {
            segments.push({
                index: segments.length,
                p1: { world: { y: lastY(), z: segments.length * SEGMENT_LENGTH }, screen: {} },
                p2: { world: { y: y, z: (segments.length + 1) * SEGMENT_LENGTH }, screen: {} },
                curve: curve,
                color: Math.floor(segments.length / RUMBLE_LENGTH) % 2 ? 
                       { road: '#444', grass: '#106310', rumble: '#777' } : 
                       { road: '#4a4a4a', grass: '#0d520d', rumble: '#999' }
            });
        }

        function lastY() { return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y; }

        function addRoad(enter, hold, leave, curve, y) {
            for (let n = 0; n < enter; n++) addSegment(easeIn(0, curve, n / enter), easeIn(lastY(), y, n / enter));
            for (let n = 0; n < hold; n++) addSegment(curve, y);
            for (let n = 0; n < leave; n++) addSegment(easeInOut(curve, 0, n / leave), easeInOut(y, lastY(), n / leave));
        }

        const easeIn = (a, b, percent) => a + (b - a) * Math.pow(percent, 2);
        const easeInOut = (a, b, percent) => a + (b - a) * ((-Math.cos(percent * Math.PI) / 2) + 0.5);

        // コースの作成（S字や直線）
        function resetTrack() {
            segments = [];
            addRoad(50, 50, 50, 0, 0); // スタート直線
            addRoad(100, 100, 100, 3, 500); // 右カーブ・登り
            addRoad(100, 100, 100, -3, -500); // 左カーブ・下り
            addRoad(50, 50, 50, 0, 0); // 直線
            addRoad(100, 50, 100, 5, 200); // 急な右
            addRoad(100, 50, 100, -2, 0); // 緩やかな左
            trackLength = segments.length * SEGMENT_LENGTH;
        }

        // 3D座標を2Dスクリーン座標に投影
        function project(p, cameraX, cameraY, cameraZ, cameraDepth) {
            p.screen.scale = cameraDepth / (p.world.z - cameraZ);
            p.screen.x = Math.round((canvas.width / 2) + (p.screen.scale * (p.world.x - cameraX) * canvas.width / 2));
            p.screen.y = Math.round((canvas.height / 2) - (p.screen.scale * (p.world.y - cameraY) * canvas.height / 2));
            p.screen.w = Math.round(p.screen.scale * ROAD_WIDTH * canvas.width / 2);
        }

        function drawPolygon(x1, y1, w1, x2, y2, w2, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.closePath();
            ctx.fill();
        }

        // メインループ
        function update(dt) {
            // 入力処理
            const playerSegment = segments[Math.floor(position / SEGMENT_LENGTH) % segments.length];
            const speedPercent = speed / maxSpeed;

            if (keys[38] || keys[87]) speed = speed + accel * dt;
            else if (keys[40] || keys[83]) speed = speed + breaking * dt;
            else speed = speed + decel * dt;

            // オフロード判定（ダート：緑色部分）
            if (((playerX < -1) || (playerX > 1)) && (speed > offRoadLimit)) {
                speed = speed + offRoadDecel * dt;
            }

            // ステアリング
            if (keys[37] || keys[65]) playerX = playerX - (2 * dt * speedPercent);
            else if (keys[39] || keys[68]) playerX = playerX + (2 * dt * speedPercent);

            // カーブによる遠心力
            playerX = playerX - (speedPercent * playerSegment.curve * 0.015);

            speed = Math.max(0, Math.min(speed, maxSpeed));
            position = (position + speed * dt) % trackLength;

            // UI更新
            speedOut.innerText = Math.round(speed / 100);
            lapOut.innerText = Math.floor(position / trackLength);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景（空と遠くの山的なもの）
            ctx.fillStyle = '#7290ff';
            ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
            ctx.fillStyle = '#106310';
            ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

            const baseSegment = segments[Math.floor(position / SEGMENT_LENGTH) % segments.length];
            const basePercent = (position % SEGMENT_LENGTH) / SEGMENT_LENGTH;
            const cameraHeight = lastY() + CAMERA_HEIGHT; // 簡易的な高さ追従
            
            let x = 0;
            let dx = -(baseSegment.curve * basePercent);

            const cameraDepth = 1 / Math.tan((FOV / 2) * Math.PI / 180);

            for (let n = 0; n < DRAW_DISTANCE; n++) {
                const segment = segments[(baseSegment.index + n) % segments.length];
                const looped = segment.index < baseSegment.index;
                
                project(segment.p1, playerX * ROAD_WIDTH, CAMERA_HEIGHT + baseSegment.p1.world.y, position - (looped ? trackLength : 0), cameraDepth);
                project(segment.p2, playerX * ROAD_WIDTH - x, CAMERA_HEIGHT + baseSegment.p1.world.y, position - (looped ? trackLength : 0), cameraDepth);

                x += dx;
                dx += segment.curve;

                if (segment.p1.screen.scale <= 0) continue;

                const p1 = segment.p1.screen;
                const p2 = segment.p2.screen;

                // 草原(ダート)
                ctx.fillStyle = segment.color.grass;
                ctx.fillRect(0, p2.y, canvas.width, p1.y - p2.y);

                // 縁石(ランブル)
                const r1 = p1.w * 0.1;
                const r2 = p2.w * 0.1;
                drawPolygon(p1.x, p1.y, p1.w + r1, p2.x, p2.y, p2.w + r2, segment.color.rumble);
                
                // コース(道路)
                drawPolygon(p1.x, p1.y, p1.w, p2.x, p2.y, p2.w, segment.color.road);
            }

            // プレイヤー（自車）の描画 - シンプルな矩形
            const playerW = 80;
            const playerH = 40;
            ctx.fillStyle = "red";
            ctx.fillRect(canvas.width / 2 - playerW / 2, canvas.height - 80, playerW, playerH);
            ctx.fillStyle = "black"; // タイヤっぽく
            ctx.fillRect(canvas.width / 2 - playerW / 2 - 5, canvas.height - 60, 10, 20);
            ctx.fillRect(canvas.width / 2 + playerW / 2 - 5, canvas.height - 60, 10, 20);
        }

        // ループ制御
        let lastTime = Date.now();
        function frame() {
            let now = Date.now();
            let dt = Math.min(1, (now - lastTime) / 1000);
            update(dt);
            render();
            lastTime = now;
            requestAnimationFrame(frame);
        }

        // イベントリスナー
        window.addEventListener('keydown', e => keys[e.keyCode] = true);
        window.addEventListener('keyup', e => keys[e.keyCode] = false);

        // 開始
        resetTrack();
        frame();

    </script>
</body>
</html>
