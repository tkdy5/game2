<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Grand Prix Turbo - F1 Style</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background: #333;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }
        .stat {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 2px black;
        }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #e10600; /* F1 Red */
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover { background: #ff0800; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="stat">SPEED: <span id="speedDisplay">0</span> km/h</div>
        <div class="stat">SCORE: <span id="scoreDisplay">0</span></div>
    </div>
    <div id="overlay">
        <h1>GRAND PRIX TURBO</h1>
        <p>左右キー (← →) で操作</p>
        <button onclick="startGame()">START RACE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const speedDisplay = document.getElementById('speedDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overlay = document.getElementById('overlay');

    // キャンバスサイズ設定
    canvas.width = 400;
    canvas.height = 600;

    // ゲーム状態
    let gameActive = false;
    let score = 0;
    let speed = 0;
    let playerX = canvas.width / 2;
    let trackOffset = 0;
    let enemies = [];
    let particles = [];
    let frameCount = 0;

    // 定数
    const MAX_SPEED = 15;
    const PLAYER_WIDTH = 40;
    const PLAYER_HEIGHT = 70;

    // キー入力
    let keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() {
        gameActive = true;
        score = 0;
        speed = 5;
        playerX = canvas.width / 2;
        enemies = [];
        overlay.style.display = 'none';
        animate();
    }

    function createEnemy() {
        if (frameCount % 60 === 0) {
            enemies.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: -100,
                type: Math.random() > 0.8 ? '#00d2be' : '#ff8700' // メルセデス風 or マクラーレン風
            });
        }
    }

    function drawPlayer(x, y) {
        // ウイング
        ctx.fillStyle = '#e10600';
        ctx.fillRect(x - 20, y + 40, 40, 10); // リア
        ctx.fillRect(x - 18, y - 5, 36, 5);   // フロント
        
        // ボディ
        ctx.fillStyle = '#111';
        ctx.fillRect(x - 10, y, 20, 50);
        
        // タイヤ
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 22, y + 5, 8, 15);  // 前左
        ctx.fillRect(x + 14, y + 5, 8, 15);  // 前右
        ctx.fillRect(x - 24, y + 35, 10, 18); // 後左
        ctx.fillRect(x + 14, y + 35, 10, 18); // 後右
    }

    function drawEnemy(e) {
        ctx.fillStyle = e.type;
        ctx.fillRect(e.x - 10, e.y, 20, 50);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x - 22, e.y + 5, 8, 15);
        ctx.fillRect(e.x + 14, e.y + 5, 8, 15);
    }

    function update() {
        if (!gameActive) return;

        // 加速と減速
        if (speed < MAX_SPEED) speed += 0.01;
        
        // 左右移動
        if (keys['ArrowLeft'] && playerX > 40) playerX -= 5;
        if (keys['ArrowRight'] && playerX < canvas.width - 40) playerX += 5;

        // 道路の端での減速（コースアウト）
        if (playerX < 80 || playerX > canvas.width - 80) {
            speed *= 0.98;
            if (frameCount % 5 === 0) createSmoke(playerX, 550);
        }

        // 背景ループ
        trackOffset += speed;
        if (trackOffset > 100) trackOffset = 0;

        // 敵の管理
        createEnemy();
        enemies.forEach((e, index) => {
            e.y += speed * 0.5; // 相対速度
            
            // 衝突判定
            if (Math.abs(e.x - playerX) < 35 && Math.abs(e.y - 520) < 50) {
                gameOver();
            }

            if (e.y > canvas.height) {
                enemies.splice(index, 1);
                score += 10;
            }
        });

        scoreDisplay.innerText = score;
        speedDisplay.innerText = Math.floor(speed * 20);
        frameCount++;
    }

    function createSmoke(x, y) {
        particles.push({x, y, opacity: 1});
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // グリーン (芝生)
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // アスファルト
        ctx.fillStyle = '#444';
        ctx.fillRect(50, 0, canvas.width - 100, canvas.height);

        // 白線
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([20, 20]);
        ctx.lineDashOffset = -trackOffset;
        ctx.beginPath();
        ctx.moveTo(60, 0); ctx.lineTo(60, canvas.height);
        ctx.moveTo(canvas.width - 60, 0); ctx.lineTo(canvas.width - 60, canvas.height);
        ctx.stroke();

        // センターライン
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // 敵の描画
        enemies.forEach(e => drawEnemy(e));

        // プレイヤーの描画
        drawPlayer(playerX, 520);

        // パーティクル
        ctx.setLineDash([]);
        particles.forEach((p, i) => {
            ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
            ctx.fill();
            p.opacity -= 0.05;
            if (p.opacity <= 0) particles.splice(i, 1);
        });
    }

    function gameOver() {
        gameActive = false;
        overlay.style.display = 'block';
        overlay.innerHTML = `<h1>RETIRED</h1><p>SCORE: ${score}</p><button onclick="startGame()">RETRY</button>`;
    }

    function animate() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(animate);
    }

    // 初期背景だけ描画
    draw();
</script>

</body>
</html>
