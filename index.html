<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Retro 3D Racer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #gameCanvas {
            background: #000;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h2 id="speed">Speed: 0 km/h</h2>
        <h2 id="lap">Lap: 0 / 3</h2>
        <p>Arrows or WASD to Drive</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedElement = document.getElementById('speed');
        const lapElement = document.getElementById('lap');

        // --- 設定 ---
        const width = 800;
        const height = 600;
        canvas.width = width;
        canvas.height = height;

        const roadWidth = 2000;
        const segmentLength = 200;
        const rumbleLength = 3;
        const lanes = 3;
        const fieldOfView = 100;
        const cameraHeight = 1000;
        const drawDistance = 300;
        const fogDensity = 5;

        let playerX = 0; // -1 to 1
        let position = 0;
        let speed = 0;
        const maxSpeed = segmentLength * 60; // 60fps
        const accel = maxSpeed / 5;
        const breaking = -maxSpeed / 2;
        const decel = -maxSpeed / 10;
        const offRoadDecel = -maxSpeed / 2;
        const offRoadLimit = maxSpeed / 4;

        let segments = [];
        let trackLength = 0;

        // --- 入力管理 ---
        const keys = { up: false, down: false, left: false, right: false };
        document.addEventListener('keydown', e => keyHandler(e, true));
        document.addEventListener('keyup', e => keyHandler(e, false));

        function keyHandler(e, value) {
            switch(e.key.toLowerCase()) {
                case 'arrowup': case 'w': keys.up = value; break;
                case 'arrowdown': case 's': keys.down = value; break;
                case 'arrowleft': case 'a': keys.left = value; break;
                case 'arrowright': case 'd': keys.right = value; break;
            }
        }

        // --- コース生成 ---
        function addSegment(curve, y) {
            segments.push({
                index: segments.length,
                p1: { world: { y: lastY(), z: segments.length * segmentLength }, screen: {} },
                p2: { world: { y: y, z: (segments.length + 1) * segmentLength }, screen: {} },
                curve: curve,
                color: Math.floor(segments.length / rumbleLength) % 2 ? 
                    { road: '#333', grass: '#106310', rumble: '#777', lane: '#ccc' } : 
                    { road: '#383838', grass: '#005108', rumble: '#fff', lane: '#383838' }
            });
        }

        function lastY() { return segments.length === 0 ? 0 : segments[segments.length - 1].p2.world.y; }

        function buildTrack() {
            // 直線
            for(let i=0; i<100; i++) addSegment(0, 0);
            // 緩やかな右カーブ
            for(let i=0; i<100; i++) addSegment(2, i * 2);
            // 坂道と左カーブ
            for(let i=0; i<100; i++) addSegment(-3, 200 + (Math.sin(i/10)*500));
            // 直線
            for(let i=0; i<200; i++) addSegment(0, 0);
            
            trackLength = segments.length * segmentLength;
        }

        // --- 数学補助 ---
        function project(p, cameraX, cameraY, cameraZ, cameraDepth) {
            p.screen.scale = cameraDepth / (p.world.z - cameraZ);
            p.screen.x = Math.round((width / 2) + (p.screen.scale * (p.world.x - cameraX) * width / 2));
            p.screen.y = Math.round((height / 2) - (p.screen.scale * (p.world.y - cameraY) * height / 2));
            p.screen.w = Math.round(p.screen.scale * roadWidth * width / 2);
        }

        function drawPolygon(x1, y1, w1, x2, y2, w2, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.closePath();
            ctx.fill();
        }

        // --- メインループ ---
        function update(dt) {
            // 加減速
            if (keys.up) speed += accel * dt;
            else if (keys.down) speed += breaking * dt;
            else speed += decel * dt;

            // オフロード判定
            if (((playerX < -1) || (playerX > 1)) && (speed > offRoadLimit))
                speed += offRoadDecel * dt;

            speed = Math.max(0, Math.min(speed, maxSpeed));
            position += speed * dt;
            while (position >= trackLength) position -= trackLength;
            while (position < 0) position += trackLength;

            // ハンドル操作
            const dx = dt * 2 * (speed / maxSpeed);
            if (keys.left) playerX -= dx;
            if (keys.right) playerX += dx;

            // カーブによる遠心力
            const startSeg = Math.floor(position / segmentLength) % segments.length;
            playerX -= dx * (speed / maxSpeed) * segments[startSeg].curve * 0.5;
            playerX = Math.max(-2, Math.min(2, playerX));

            // UI更新
            speedElement.innerText = `Speed: ${Math.round(speed / 100)} km/h`;
            lapElement.innerText = `Lap: ${Math.floor(position / trackLength) + 1} / 3`;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 背景（空と地面の境目）
            ctx.fillStyle = '#72D1F6';
            ctx.fillRect(0, 0, width, height / 2);
            ctx.fillStyle = '#106310';
            ctx.fillRect(0, height / 2, width, height / 2);

            const baseSegment = segments[Math.floor(position / segmentLength) % segments.length];
            const basePercent = (position % segmentLength) / segmentLength;
            const cameraZ = position;
            const cameraX = playerX * roadWidth;
            const cameraDepth = 1 / Math.tan((fieldOfView / 2) * Math.PI / 180);
            
            let maxy = height;
            let x = 0;
            let dx = -(baseSegment.curve * basePercent);

            // 道路のレンダリング
            for (let i = 0; i < drawDistance; i++) {
                const segment = segments[(baseSegment.index + i) % segments.length];
                const looped = segment.index < baseSegment.index;
                
                project(segment.p1, cameraX - x, cameraHeight, cameraZ - (looped ? trackLength : 0), cameraDepth);
                project(segment.p2, cameraX - x - dx, cameraHeight, cameraZ - (looped ? trackLength : 0), cameraDepth);
                
                x += dx;
                dx += segment.curve;

                if (segment.p1.screen.z <= cameraDepth || segment.p2.screen.y >= maxy) continue;

                const p1 = segment.p1.screen;
                const p2 = segment.p2.screen;

                // 草原
                drawPolygon(0, p1.y, width, 0, p2.y, width, segment.color.grass);
                // 路肩
                drawPolygon(p1.x, p1.y, p1.w * 1.1, p2.x, p2.y, p2.w * 1.1, segment.color.rumble);
                // 道路
                drawPolygon(p1.x, p1.y, p1.w, p2.x, p2.y, p2.w, segment.color.road);

                // 白線
                if (segment.color.lane !== segment.color.road) {
                    const lineW1 = p1.w / 20;
                    const lineW2 = p2.w / 20;
                    drawPolygon(p1.x, p1.y, lineW1, p2.x, p2.y, lineW2, segment.color.lane);
                }
                
                maxy = p2.y;
            }

            // 自車（簡易的な矩形描写）
            ctx.fillStyle = '#f00';
            const carW = 80;
            const carH = 40;
            ctx.fillRect(width/2 - carW/2, height - carH - 20, carW, carH);
            ctx.fillStyle = '#000';
            ctx.fillRect(width/2 - carW/2 + 10, height - carH - 10, 15, 15); // タイヤ
            ctx.fillRect(width/2 + carW/2 - 25, height - carH - 10, 15, 15);
        }

        let lastTime = performance.now();
        function frame() {
            const now = performance.now();
            const dt = Math.min(1, (now - lastTime) / 1000);
            update(dt);
            draw();
            lastTime = now;
            requestAnimationFrame(frame);
        }

        buildTrack();
        frame();

    </script>
</body>
</html>
