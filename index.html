<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Prix JS - 3D F1 Racing</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        /* HUD (UI表示) */
        #ui {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            text-align: right;
            pointer-events: none;
        }
        #speed { font-size: 48px; font-weight: bold; font-style: italic; }
        #unit { font-size: 18px; margin-left: 5px; }
        
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-left: 4px solid #e10600; /* F1 Red */
        }
        .controls { font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

<div id="instructions">
    <strong>GRAND PRIX JS</strong><br>
    <span class="controls">↑ / W</span> : 加速<br>
    <span class="controls">↓ / S</span> : ブレーキ・後退<br>
    <span class="controls">← → / A D</span> : ステアリング
</div>

<div id="ui">
    <div id="speed">0</div>
    <div id="unit">KM/H</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 設定と変数 ---
    let scene, camera, renderer, car, clock;
    let speed = 0;
    let rotation = 0;
    const stats = {
        maxSpeed: 0.8,
        acceleration: 0.005,
        deceleration: 0.01,
        friction: 0.002,
        steering: 0.03
    };

    const keys = { w: false, s: false, a: false, d: false };

    // --- 初期化 ---
    init();
    animate();

    function init() {
        // シーン
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 青空
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        // カメラ
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        // レンダラー
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 光源
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // 地面（サーキット）
        createTrack();

        // マシン (F1)
        car = createF1Car();
        scene.add(car);

        clock = new THREE.Clock();

        // イベントリスナー
        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));
        window.addEventListener('resize', onWindowResize);
    }

    // --- F1マシンのモデリング ---
    function createF1Car() {
        const group = new THREE.Group();

        // ボディ（メイン）
        const bodyGeo = new THREE.BoxGeometry(0.6, 0.3, 2);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xe10600 }); // F1レッド
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.2;
        body.castShadow = true;
        group.add(body);

        // ノーズ
        const noseGeo = new THREE.BoxGeometry(0.3, 0.15, 1);
        const nose = new THREE.Mesh(noseGeo, bodyMat);
        nose.position.set(0, 0.15, 1.2);
        group.add(nose);

        // フロントウィング
        const wingGeo = new THREE.BoxGeometry(1.4, 0.05, 0.3);
        const wingMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const fWing = new THREE.Mesh(wingGeo, wingMat);
        fWing.position.set(0, 0.1, 1.6);
        group.add(fWing);

        // タイヤ (4つ)
        const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.2, 32);
        const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const positions = [
            [-0.45, 0.25, 0.8], [0.45, 0.25, 0.8],   // 前輪
            [-0.5, 0.25, -0.7], [0.5, 0.25, -0.7]    // 後輪
        ];

        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(...pos);
            group.add(wheel);
        });

        return group;
    }

    // --- サーキットの作成 ---
    function createTrack() {
        // アスファルト
        const floorGeo = new THREE.PlaneGeometry(2000, 2000);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // グリッド線
        const grid = new THREE.GridHelper(2000, 100, 0x555555, 0x444444);
        scene.add(grid);

        // 縁石（赤白）を並べる
        for(let i = -100; i < 100; i++) {
            const kerbGeo = new THREE.BoxGeometry(2, 0.05, 1);
            const kerbMat = new THREE.MeshPhongMaterial({ color: i % 2 === 0 ? 0xffffff : 0xff0000 });
            const leftKerb = new THREE.Mesh(kerbGeo, kerbMat);
            leftKerb.position.set(-8, 0.01, i * 2);
            scene.add(leftKerb);

            const rightKerb = leftKerb.clone();
            rightKerb.position.x = 8;
            scene.add(rightKerb);
        }
    }

    // --- ループ処理 ---
    function handleKey(e, isDown) {
        const key = e.key.toLowerCase();
        if (key === 'arrowup' || key === 'w') keys.w = isDown;
        if (key === 'arrowdown' || key === 's') keys.s = isDown;
        if (key === 'arrowleft' || key === 'a') keys.a = isDown;
        if (key === 'arrowright' || key === 'd') keys.d = isDown;
    }

    function updatePhysics() {
        // 加速と減速
        if (keys.w) {
            speed += stats.acceleration;
        } else if (keys.s) {
            speed -= stats.deceleration;
        } else {
            // 摩擦
            if (speed > 0) speed -= stats.friction;
            if (speed < 0) speed += stats.friction;
            if (Math.abs(speed) < 0.001) speed = 0;
        }

        // 速度制限
        speed = Math.max(-stats.maxSpeed / 2, Math.min(speed, stats.maxSpeed));

        // ステアリング (速度が出ているときだけ曲がる)
        if (Math.abs(speed) > 0.01) {
            const steerDir = speed > 0 ? 1 : -1;
            if (keys.a) rotation += stats.steering * steerDir;
            if (keys.d) rotation -= stats.steering * steerDir;
        }

        // 位置の更新
        car.position.x += Math.sin(rotation) * speed;
        car.position.z += Math.cos(rotation) * speed;
        car.rotation.y = rotation;

        // UI更新
        document.getElementById('speed').innerText = Math.floor(Math.abs(speed) * 400);
    }

    function updateCamera() {
        // 車の後方にカメラを配置
        const offset = new THREE.Vector3(
            -Math.sin(rotation) * 5,
            2,
            -Math.cos(rotation) * 5
        );
        camera.position.lerp(car.position.clone().add(offset), 0.1);
        camera.lookAt(car.position);
    }

    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        updateCamera();
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
